name: Bug report
description: Something is broken or behaving wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can — vague reports often go nowhere.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what did you see?
      placeholder: I scanned a product photo of X and got Y, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - Web (alzhal.app or a self-hosted deploy)
        - WhatsApp bot
        - Telegram bot
        - Local dev (npm run dev)
        - Other
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: Language selected
      placeholder: e.g. English, Tamil, Hindi
  - type: textarea
    id: ingredient-or-product
    attributes:
      label: Ingredient or product involved (if any)
      description: If a specific ingredient was misclassified, paste the name and the verdict you got.
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps. If a photo is involved, paste a public URL or attach the photo.
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Console errors, screenshots, anything that might help.
