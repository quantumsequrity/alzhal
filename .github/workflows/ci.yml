name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run if a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

  # Lint is intentionally not wired up yet. Next.js 16 removed `next lint`
  # and the project has no standalone eslint config. Add `eslint.config.mjs`
  # and a working `lint` script before adding a lint job here.
